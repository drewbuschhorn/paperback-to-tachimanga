syntax = "proto3";

message Backup {
  repeated BackupManga backupManga = 1;
  repeated BackupCategory backupCategories = 2;
  repeated BrokenBackupSource backupBrokenSources = 3;
  repeated BackupSource backupSources = 4;
}

message BackupManga {
  int64 source = 1;
  string url = 2;
  string title = 3;
  string artist = 4;
  string author = 5;
  string description = 6;
  repeated string genre = 7;
  int32 status = 8;
  string thumbnailUrl = 9;
  int64 dateAdded = 10;
  int32 viewer = 11;
  repeated BackupChapter chapters = 12;
  repeated int64 categories = 13;
  repeated BackupTracking tracking = 14;
  bool favorite = 15;
  int32 chapterFlags = 16;
  repeated BackupHistory history = 17;
  int32 viewerFlags = 18;
  int64 lastModifiedAt = 19;
  int64 favoriteModifiedAt = 20;
  repeated string excludedScanlators = 21;
  int32 updateStrategy = 22;
}

message BackupChapter {
  string url = 1;
  string name = 2;
  string scanlator = 3;
  bool read = 4;
  bool bookmark = 5;
  int64 lastPageRead = 6;
  int64 dateFetch = 7;
  int64 dateUpload = 8;
  float chapterNumber = 9;
  int64 sourceOrder = 10;
  int64 lastModifiedAt = 11;
}

message BackupHistory {
  string url = 1;
  int64 lastRead = 2;
  int64 readDuration = 3;
}

message BackupTracking {
  int32 syncId = 1;
  int64 libraryId = 2;
  int32 mediaId = 100;
  string mediaIdInt = 3;
  string trackingUrl = 4;
  string title = 5;
  float lastChapterRead = 6;
  int32 totalChapters = 7;
  float score = 8;
  int32 status = 9;
  int64 startedReadingDate = 10;
  int64 finishedReadingDate = 11;
}

message BackupCategory {
  string name = 1;
  int64 order = 2;
  int64 flags = 100;
}

message BackupSource {
  string name = 1;
  int64 sourceId = 2;
}

message BrokenBackupSource {
  string name = 1;
  int64 sourceId = 2;
}
